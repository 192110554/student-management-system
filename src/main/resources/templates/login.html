<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <style>
        body {
            background: #f4f7fc;
        }

        .login-card {
            max-width: 450px;
            margin: 100px auto;
            border-radius: 20px;
        }
    </style>

</head>
<body>

<div class="container">

    <div class="card login-card shadow p-4">

        <h2 class="text-center mb-4">
            Student Login
        </h2>

        <form method="post" action="/login">

            <div class="mb-3">
                <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Username">
            </div>

            <div class="mb-3">
                <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Password">
            </div>

            <button
                    class="btn btn-primary w-100">
                Login
            </button>

        </form>

    </div>

</div>

</body>
</html>
